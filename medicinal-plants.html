<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicinal Plants — AgriBotany Hub</title>
  <meta name="description" content="Medicinal plants: traditional uses, active compounds, and cultivation methods.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="page-hero">
    <div class="container">
      <span class="eyebrow">🌱 Healing Plants</span>
      <h1>Medicinal Plants</h1>
      <p>Traditional uses, active compounds, and cultivation methods for important medicinal plant species.</p>
    </div>
  </div>

  <main>
    <section class="section">
      <div class="container">
        <div id="admin-bar-placeholder"></div>
        <div id="adminPanel" class="admin-panel hidden">
          <h3>Add a medicinal plant record</h3>
          <form id="medForm">
            <div class="grid grid-2">
              <div class="form-row">
                <label for="medCommon">Common name</label>
                <input type="text" id="medCommon" required placeholder="e.g. Brahmi">
              </div>
              <div class="form-row">
                <label for="medScientific">Scientific name</label>
                <input type="text" id="medScientific" required placeholder="e.g. Bacopa monnieri">
              </div>
            </div>
            <div class="form-row">
              <label for="medFamily">Family</label>
              <input type="text" id="medFamily" required placeholder="e.g. Plantaginaceae">
            </div>
            <div class="form-row">
              <label for="medTraditional">Traditional uses</label>
              <textarea id="medTraditional" required placeholder="Describe traditional/folk medicine uses"></textarea>
            </div>
            <div class="form-row">
              <label for="medCompounds">Active compounds</label>
              <input type="text" id="medCompounds" required placeholder="e.g. Bacosides A and B">
            </div>
            <div class="form-row">
              <label for="medCultivation">Cultivation methods</label>
              <textarea id="medCultivation" required placeholder="Describe how it's grown"></textarea>
            </div>
            <div class="form-row">
              <label for="medImage">Image (optional)</label>
              <input type="file" id="medImage" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">Add Plant</button>
          </form>
        </div>

        <div class="grid grid-3" id="medGrid"></div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script>
    initSharedUI("medicinal");
    initAdminBar("admin-bar-placeholder", (isAdmin) => {
      document.getElementById("adminPanel").classList.toggle("hidden", !isAdmin);
      renderMed();
    });

    function renderMed() {
      const items = DataStore.get("medicinalPlants");
      const isAdmin = AdminAuth.isLoggedIn();

      document.getElementById("medGrid").innerHTML = items.map(m => `
        <div class="specimen-card">
          <div class="specimen-photo">
            ${m.image ? `<img src="${m.image}" alt="${escapeHtml(m.common)}">` : '🌿'}
          </div>
          <div class="specimen-body">
            <div class="specimen-id">Medicinal Plant</div>
            <h3>${escapeHtml(m.scientific)}</h3>
            <div class="specimen-common">${escapeHtml(m.common)} · ${escapeHtml(m.family)}</div>
            <table class="specimen-table">
              <tr><td>Traditional Uses</td><td>${escapeHtml(m.traditionalUses)}</td></tr>
              <tr><td>Active Compounds</td><td>${escapeHtml(m.activeCompounds)}</td></tr>
              <tr><td>Cultivation</td><td>${escapeHtml(m.cultivation)}</td></tr>
            </table>
            ${isAdmin ? `<button class="btn btn-outline" style="border-color:var(--line); color:var(--ink); width:100%; margin-top:0.4rem;" onclick="deleteMed('${m.id}')">Delete</button>` : ''}
          </div>
        </div>
      `).join("");
    }

    function deleteMed(id) {
      if (!confirm("Delete this medicinal plant record?")) return;
      const items = DataStore.get("medicinalPlants").filter(m => m.id !== id);
      DataStore.set("medicinalPlants", items);
      renderMed();
    }

    document.getElementById("medForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fileInput = document.getElementById("medImage");
      readImageAsDataURL(fileInput, (imageData) => {
        const items = DataStore.get("medicinalPlants");
        items.push({
          id: DataStore.genId("m"),
          common: document.getElementById("medCommon").value.trim(),
          scientific: document.getElementById("medScientific").value.trim(),
          family: document.getElementById("medFamily").value.trim(),
          traditionalUses: document.getElementById("medTraditional").value.trim(),
          activeCompounds: document.getElementById("medCompounds").value.trim(),
          cultivation: document.getElementById("medCultivation").value.trim(),
          image: imageData
        });
        DataStore.set("medicinalPlants", items);
        e.target.reset();
        renderMed();
      });
    });

    renderMed();
  </script>
</body>
</html>
